<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Inspector - RFC 1035</title>
    <link rel="stylesheet" href="../style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <a href="../index.html" class="btn btn-theme" style="position: absolute; left: 0; top: 0; text-decoration: none; display: flex; align-items: center; height: 100%; box-sizing: border-box;">
            &larr; Portal
        </a>
        <h1>DNS Message Inspector</h1>
        <p class="subtitle">RFC 1034/1035 Domain Name System Resolution Simulation</p>
    </header>

    <div class="control-bar">
        <div class="node-group">
            <strong>DNS Query</strong>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="text" id="input-domain" value="www.example.com" title="Domain Name to resolve" style="width:150px; padding:4px; font-family: monospace;">
                
                <label style="font-size:12px;">Type: 
                    <select id="input-qtype" style="padding:2px;" title="Query Type">
                        <option value="1">A (IPv4 Address)</option>
                        <option value="5">CNAME (Canonical Name)</option>
                        <option value="15">MX (Mail Exchange)</option>
                        <option value="2">NS (Name Server)</option>
                    </select>
                </label>
            </div>
        </div>

        <div class="node-group">
            <button class="btn btn-theme" id="btn-theme" onclick="toggleTheme()">🌙 Dark Mode</button>
            <button class="btn" id="btn-send" onclick="runDnsQuery()">Send Query</button>
            <button class="btn btn-danger" onclick="resetSimulation()">Clear Log</button>
        </div>

        <div class="node-group">
            <span class="state-badge" id="net-status">IDLE</span>
        </div>
    </div>

    <div class="layout">
        <div class="flow-container">
            <h3>DNS Traffic Log</h3>
            <div id="packet-list">
                <p id="empty-log-msg" class="empty-msg">No DNS traffic recorded.</p>
            </div>
        </div>

        <div class="inspector">
            <div class="diagram-container">
                <h3>RFC 1035 Message Format</h3>
                <div id="diagram-content">
                    <p class="empty-msg">Select a DNS message to inspect.</p>
                </div>
            </div>

            <div class="hex-container">
                <div class="hex-header">
                    <div style="width: 45px;">Offset</div>
                    <div style="flex: 1;">Hexadecimal</div>
                    <div style="width: 120px;">ASCII</div>
                </div>
                <div id="hex-content"></div>
            </div>
        </div>
    </div>

    <div id="floating-balloon" class="floating-balloon">
        <strong id="balloon-title">Field Name</strong>
        <p id="balloon-desc">Description.</p>
    </div>
</body>
</html>
