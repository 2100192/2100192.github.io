<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Inspector - RFC 4251</title>
    <link rel="stylesheet" href="../style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <a href="../index.html" class="btn btn-theme" style="position: absolute; left: 0; top: 0; text-decoration: none; display: flex; align-items: center; height: 100%; box-sizing: border-box;">
            &larr; Portal
        </a>
        <h1>SSH Architecture Inspector</h1>
        <p class="subtitle">RFC 4251 Secure Shell Protocol Layers & Packet Simulation</p>
    </header>

    <div class="control-bar">
        <div class="node-group">
            <strong>Simulation Phase</strong>
            <select id="sim-scenario" style="padding:4px; margin-left: 10px;">
                <option value="transport">1. Transport Layer (Key Exchange)</option>
                <option value="auth">2. User Authentication Protocol</option>
                <option value="connection">3. Connection Protocol (Channels)</option>
            </select>
        </div>

        <div class="node-group">
            <button class="btn btn-theme" id="btn-theme" onclick="toggleTheme()">🌙 Dark Mode</button>
            <button class="btn" id="btn-send" onclick="runSshScenario()">Run Scenario</button>
            <button class="btn btn-danger" onclick="resetSimulation()">Clear Log</button>
        </div>

        <div class="node-group">
            <span class="state-badge" id="net-status">IDLE</span>
        </div>
    </div>

    <div class="layout">
        <div class="flow-container">
            <h3>SSH Session Log</h3>
            <div id="packet-list">
                <p id="empty-log-msg" class="empty-msg">No SSH traffic recorded.</p>
            </div>
        </div>

        <div class="inspector">
            <div class="diagram-container">
                <h3>Binary Packet Protocol Diagram</h3>
                <div id="diagram-content">
                    <p class="empty-msg">Select an SSH packet to inspect.</p>
                </div>
            </div>

            <div class="hex-container">
                <div class="hex-header">
                    <div style="width: 45px;">Offset</div>
                    <div style="flex: 1;">Hexadecimal</div>
                    <div style="width: 120px;">ASCII</div>
                </div>
                <div id="hex-content"></div>
            </div>
        </div>
    </div>

    <div id="floating-balloon" class="floating-balloon">
        <strong id="balloon-title">Field Name</strong>
        <p id="balloon-desc">Description.</p>
    </div>
</body>
</html>
